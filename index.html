<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Justin Lay Icons</title>
        <style>
            .row{
                width:720px;
                margin: 10px auto 10px auto ;
            }
            .image-container {
                display: table-cell;
                vertical-align: middle;
                padding:20px;
            }
        </style>
</head>

<body>
    <h1>Empty</h1>
    <div class="row">
            <div class="image-container"><img id="iconFriends" src="icons/iconFriends.svg" height="200" width="200"/></div>
            <div class="image-container"><img id="iconGames" src="icons/iconGames.svg" height="200" width="200"/></div>
            <div class="image-container"><img id="iconLibrary" src="icons/iconLibrary.svg" height="200" width="200"/></div>
        </div>

        <div class="row">
            <div class="image-container"><img id="iconLocked" src="icons/iconLocked.svg" height="200" width="200"/></div>
            <div class="image-container"><img id="iconMedia" src="icons/iconMedia.svg" height="200" width="200"/></div>
            <div class="image-container"><img id="iconSearch" src="icons/iconSearch.svg" height="200" width="200"/></div>
            </div>

        <div class="row">
            <div class="image-container"><img id="iconSettings" src="icons/iconSettings.svg" height="200" width="200"/></div>
            <div class="image-container"><img id="iconShared" src="icons/iconShared.svg" height="200" width="200"/></div>
            <div class="image-container"><img id="iconShop" src="icons/iconShop.svg" height="200" width="200"/></div>
        </div>
</body>
</html>

<script>
    //Friends
    const iconFriends = document.getElementById ("iconFriends")
    const soundFriends = new Audio ()
    soundFriends.src = "sounds/flamingo_glass.mp3"

    iconFriends.onpointerdown = () => {
        soundFriends.play ()
        iconFriends.src = "img/changedImage/hex.png"

        setTimeout (() => {
            iconFriends.src = "icons/iconFriends.svg"
        }, 500)
    }
